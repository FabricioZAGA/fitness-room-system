name: CI — Lint, Type-check & Test

on:
  push:
    branches: ["main", "develop", "fzacarias/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  backend-ci:
    name: Backend CI (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=80
        env:
          DYNAMODB_TABLE_NAME: fitness-room-test
          ENVIRONMENT: test
          COGNITO_USER_POOL_ID: us-east-1_TEST
          COGNITO_CLIENT_ID: test-client-id

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  frontend-ci:
    name: Frontend CI (Node 22 / pnpm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
